<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA — Your Cart</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body id="body">


  <!-- Hidden inputs for mood switching (pure CSS, no JS) -->
  <div class="mood-radios">
    <input type="radio" name="mood" id="mood-cloud" checked>
    <input type="radio" name="mood" id="mood-obsidian">
    <input type="radio" name="mood" id="mood-frosted">
    <input type="radio" name="mood" id="mood-liquid">
    <input type="radio" name="mood" id="mood-neon">  </div>
  <input type="checkbox" id="mood-panel-toggle">

  <!-- MOOD PANEL -->
  <div class="mood-toggle">
    <label class="mood-tab" for="mood-panel-toggle">✦ AURA</label>
  </div>
  <div class="mood-panel" id="moodPanel">
    <h3>✦ SET YOUR AURA</h3>
    <label class="mood-btn mood-btn-cloud" for="mood-cloud"><span class="mood-dot" style="background:#fff; border:1px solid #ccc;"></span>☁️ Cloud White</label>
    <label class="mood-btn mood-btn-obsidian" for="mood-obsidian"><span class="mood-dot" style="background:#000; border:1px solid #333;"></span>🌑 Obsidian Dark</label>
    <label class="mood-btn mood-btn-frosted" for="mood-frosted"><span class="mood-dot" style="background:#667eea"></span>🧊 Frosted Glass</label>
    <label class="mood-btn mood-btn-liquid" for="mood-liquid"><span class="mood-dot" style="background:#ff9a9e; border-radius:30% 70% 70% 30%/30% 30% 70% 70%;"></span>🔥 Ember Dusk</label>
    <label class="mood-btn mood-btn-neon" for="mood-neon"><span class="mood-dot" style="background:#00ffff; box-shadow:0 0 8px #00ffff;"></span>🔋 Cyber Neon</label>
  </div>

  <nav>
    <a href="index.html" class="logo">AURA</a>
    <ul class="nav-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="new_arrivals.html">New Arrivals</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="reviews.html">Reviews</a></li>
    </ul>
    <div class="nav-icons">
      <form action="shop.html" method="GET" style="display:inline-flex; align-items:center; background:var(--blur-bg, rgba(255,255,255,0.05)); border:1px solid var(--border, #333); border-radius:20px; padding:4px 12px; height: 32px;">
        <input type="search" name="q" placeholder="Search..." required style="background:transparent; border:none; color:var(--text, #fff); outline:none; font-family:inherit; font-size:14px; width:100px;">
        <button type="submit" style="background:transparent; border:none; cursor:pointer; color:var(--text, #fff); padding:0; margin-left:6px; font-size:14px;">🔍</button>
      </form>
      <a href="wishlist.html" style="position:relative;">♡<sup class="wishlist-count" id="wishlistCount">0</sup></a>
      <a href="cart.html">🛍<sup class="cart-count" id="cartCount">0</sup></a>
    </div>
  </nav>

  <div class="cart-hero">
    <h1>Your <em>Cart</em></h1>
  </div>

  <div class="steps">
    <div class="step active">
      <div class="step-num">1</div><span>Cart</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">2</div><span>Address</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">3</div><span>Payment</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">4</div><span>Confirm</span>
    </div>
  </div>

  <div class="cart-layout">
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-summary">
      <div class="summary-title">Order Summary</div>
      <div class="summary-row"><span>Subtotal (<span id="itemCount">0</span> items)</span><span id="subtotal">₹0</span>
      </div>
      <div class="summary-row"><span>Delivery</span><span id="delivery" style="color:#4caf50">FREE</span></div>
      <div class="summary-row"><span>Discount</span><span id="discount" style="color:#4caf50">-₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
      <div class="coupon-row">
        <input class="coupon-input" placeholder="Coupon code (try AURA10)" id="couponInput">
        <button class="coupon-btn">Apply</button>
      </div>
      <button class="checkout-btn">Proceed to Checkout →</button>
      <a href="shop.html" class="shop-more">← Continue Shopping</a>
      <div class="safe-row">
        <a href="terms_conditions.html#security" class="safe-badge">🔒 Secure</a>
        <a href="terms_conditions.html#authentic" class="safe-badge">✅ Authentic</a>
        <a href="terms_conditions.html#returns" class="safe-badge">↩️ Easy Return</a>
      </div>
    </div>
  </div>
  <script src="js/inventory.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
</body>

</html>
